name: Collect AI News

on:
  schedule:
    - cron: '0 */4 * * *'  # Каждые 4 часа
  workflow_dispatch:        # Ручной запуск

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Collect and export news
        working-directory: backend
        run: python export_news.py

      - name: Validate data size
        run: |
          MAX_SIZE=5000000
          for f in data/news.json data/sources.json data/meta.json; do
            if [ -f "$f" ]; then
              size=$(stat -c%s "$f" 2>/dev/null || stat -f%z "$f")
              if [ "$size" -gt "$MAX_SIZE" ]; then
                echo "ERROR: $f is too large ($size bytes, max $MAX_SIZE)"
                exit 1
              fi
            fi
          done

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/news.json data/sources.json data/meta.json
          git diff --cached --quiet || git commit -m "update: AI news data $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
